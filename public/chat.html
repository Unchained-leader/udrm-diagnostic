<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unchained AI Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: #000;
    }
    #chat-header {
      background: #000;
      color: #C4872E;
      border-bottom: 2px solid #C4872E;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #chat-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #C4872E;
    }
    #chat-header span {
      font-size: 12px;
      color: #d4a854;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #111;
    }
    .msg {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: #C4872E;
      color: #000;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-bottom-left-radius: 4px;
    }
    #chat-input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 2px solid #C4872E;
      background: #000;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      border: 1px solid #333;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      resize: none;
      max-height: 80px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    #chat-input::placeholder { color: #777; }
    #chat-input:focus { border-color: #C4872E; }
    #chat-send {
      background: #C4872E;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin-left: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #chat-send:hover { background: #a36e22; }
    #chat-send:disabled { background: #333; cursor: not-allowed; }
    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 8px 12px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #C4872E;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <div>
        <h2>Unchained AI Coach</h2>
        <span>Powered by Unchained Leader RNR Methodology</span>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="What's going on?" rows="1"></textarea>
      <button id="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const API_URL = "https://unchained-ai-coach.vercel.app/api/chat";
    const WELCOME_MESSAGE = "Hey brother. I'm your Unchained AI Coach \u2014 I know every module, every framework, and every exercise in the program. Whether you need help understanding a concept, walking through an exercise, or processing a trigger right now, I'm here. What's going on?";

    let messages = [];
    let isStreaming = false;

    const messagesEl = document.getElementById("chat-messages");
    const inputEl = document.getElementById("chat-input");
    const sendBtn = document.getElementById("chat-send");

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typing";
      div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      messages.push({ role: "user", content });
      addMessage("user", content);
      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            userId: null,
            userName: null,
            currentWeek: null,
          }),
        });

        if (!response.ok) throw new Error("API error");

        removeTyping();

        const assistantDiv = document.createElement("div");
        assistantDiv.className = "msg assistant";
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        assistantDiv.appendChild(bubble);
        messagesEl.appendChild(assistantDiv);

        let fullResponse = "";
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullResponse += parsed.text;
                  bubble.textContent = fullResponse.replace("[CRISIS_DETECTED]", "").trim();
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch (e) {}
            }
          }
        }

        messages.push({ role: "assistant", content: fullResponse.replace("[CRISIS_DETECTED]", "").trim() });
      } catch (error) {
        removeTyping();
        addMessage("assistant", "I'm having trouble connecting right now. Please try again in a moment, or reach out to your coach directly if you need immediate support.");
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Show welcome message
    addMessage("assistant", WELCOME_MESSAGE);

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
    });
  </script>
</body>
</html>
