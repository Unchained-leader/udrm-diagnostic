<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Unchained AI Guide — Unwanted Desire Root Mapping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    :root {
      --gold: #b99c4f;
      --gold-light: #DFC468;
      --gold-dark: #9A7730;
      --gold-gradient: linear-gradient(135deg, #DFC468, #9A7730);
      --gold-gradient-hover: linear-gradient(135deg, #e8d07a, #a88335);
      --black: #000000;
      --white: #ffffff;
      --gray-light: #ececec;
      --gray-dark: #1a1a1a;
      --gray-mid: #888;
      --surface: #0d0d0d;
      --surface-raised: #151515;
      --border-subtle: #222;
      --border-gold: rgba(185, 156, 79, 0.3);
    }

    /* ========== CHAT CONTAINER (shown immediately) ========== */
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: var(--black);
    }
    #chat-header {
      background: var(--black);
      border-bottom: 1px solid var(--border-gold);
      padding: 14px 20px 10px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #chat-header h2 {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    #chat-header span {
      font-size: 11px;
      color: #888;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #sign-out-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: #555;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #sign-out-btn:hover { border-color: #444; color: #888; }

    /* ========== QUIZ UI — CHECKBOXES, RADIO, TEXT INPUT ========== */
    .quiz-label {
      font-size: 14px;
      color: var(--gold-light);
      font-weight: 500;
      margin-top: 16px;
      margin-bottom: 4px;
      padding: 8px 0 4px;
      border-top: 1px solid var(--border-gold);
      line-height: 1.4;
    }
    .quiz-label:first-child {
      margin-top: 0;
      border-top: none;
    }
    .quiz-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
      width: 100%;
    }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border-gold);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .quiz-option:hover {
      background: rgba(185, 156, 79, 0.08);
      border-color: var(--gold);
    }
    .quiz-option.checked {
      background: rgba(185, 156, 79, 0.15);
      border-color: var(--gold);
    }
    .quiz-option.disabled {
      opacity: 0.35;
      pointer-events: none;
    }
    .quiz-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-gold);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
    }
    .quiz-option.radio .quiz-check {
      border-radius: 50%;
    }
    .quiz-option.checked .quiz-check {
      background: var(--gold);
      border-color: var(--gold);
    }
    .quiz-option.checked .quiz-check::after {
      content: '✓';
      color: #000;
      font-size: 13px;
      font-weight: 700;
    }
    .quiz-option-text {
      color: #eeeeee;
      font-size: 13.5px;
      line-height: 1.4;
    }
    .quiz-option.checked .quiz-option-text {
      color: var(--gold-light);
    }
    .quiz-continue-btn {
      margin-top: 10px;
      padding: 12px 24px;
      background: var(--gold-gradient);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .quiz-continue-btn:hover {
      background: var(--gold-gradient-hover);
    }
    .quiz-continue-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .quiz-text-input {
      margin-top: 8px;
      width: 100%;
      padding: 10px 14px;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      resize: vertical;
      min-height: 36px;
      max-height: 100px;
    }
    .quiz-text-input::placeholder { color: #555; }
    .quiz-text-input:focus {
      outline: none;
      border-color: var(--border-gold);
    }
    .quiz-section-label {
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 10px;
      margin-bottom: 2px;
    }

    /* Legacy MC buttons (keep for backward compat) */
    .mc-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      width: 100%;
    }
    .mc-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: transparent;
      border: 1px solid var(--border-gold);
      border-radius: 10px;
      color: #eeeeee;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 400;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .mc-btn:hover {
      background: rgba(185, 156, 79, 0.1);
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .mc-btn.selected {
      background: rgba(185, 156, 79, 0.15);
      border-color: var(--gold);
      color: var(--gold-light);
      pointer-events: none;
    }
    .mc-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
    }
    .mc-btn .mc-label {
      color: var(--gold);
      font-weight: 600;
      margin-right: 6px;
    }

    /* ========== PROGRESS BAR ========== */
    #progress-container {
      width: 100%;
      padding: 0;
      display: none;
    }
    #progress-bar-bg {
      width: 100%;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--gold-gradient);
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding: 0 2px;
    }
    #progress-text {
      font-size: 11px;
      color: #777;
      letter-spacing: 0.3px;
    }
    #progress-percent {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ========== RESET BUTTON ========== */
    .reset-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #888;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      color: #fc5454;
      border-color: #fc5454;
    }

    /* ========== MESSAGES ========== */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: var(--surface);
    }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    #chat-messages::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    .msg {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-weight: 400;
    }
    .msg.user .msg-bubble {
      background: var(--gold-gradient);
      color: #000;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface-raised);
      color: #eeeeee;
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }

    /* Welcome back link */
    #welcome-back-link {
      text-align: center;
      padding: 8px 0 4px;
    }
    #welcome-back-link button {
      background: none;
      border: none;
      color: #444;
      font-size: 12px;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    #welcome-back-link button:hover { color: var(--gold); }

    /* ========== INLINE CONTACT CAPTURE FORM ========== */
    #contact-capture {
      display: none;
      margin: 14px 0;
      padding: 20px;
      background: var(--surface-raised);
      border: 1px solid var(--border-gold);
      border-radius: 14px;
      max-width: 85%;
    }
    #contact-capture h3 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #contact-capture .capture-subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    #contact-capture input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: #0d0d0d;
      color: #e0e0e0;
      font-size: 16px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    #contact-capture input:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(185, 156, 79, 0.15); }
    #contact-capture input::placeholder { color: #555; }
    #capture-error {
      color: #fc5454;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 6px;
    }
    #capture-submit {
      width: 100%;
      padding: 12px;
      background: var(--gold-gradient);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    #capture-submit:hover { box-shadow: 0 4px 16px rgba(185, 156, 79, 0.25); }
    #capture-submit:disabled { background: #333; cursor: not-allowed; }

    /* ========== LOGIN OVERLAY ========== */
    #login-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.active { display: flex; }
    #login-box {
      background: var(--surface-raised);
      border: 1px solid var(--border-gold);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    #login-box h3 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    #login-box .login-subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #login-box input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: #0d0d0d;
      color: #e0e0e0;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    #login-box input:focus { border-color: var(--gold); }
    #login-box input::placeholder { color: #555; }
    #login-error {
      color: #fc5454;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 6px;
    }
    #login-submit {
      width: 100%;
      padding: 13px;
      background: var(--gold-gradient);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 10px;
    }
    #login-submit:hover { box-shadow: 0 4px 16px rgba(185, 156, 79, 0.25); }
    #login-submit:disabled { background: #333; cursor: not-allowed; }
    .login-links {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .login-links button {
      background: none;
      border: none;
      color: #555;
      font-size: 12px;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .login-links button:hover { color: var(--gold); }

    /* ========== RESET PIN (inside overlay) ========== */
    #reset-section {
      display: none;
    }
    #reset-section .reset-subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    #reset-step-code { display: none; }
    #reset-error {
      color: #fc5454;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 6px;
    }
    #reset-success {
      color: #4ffa78;
      font-size: 12px;
      display: none;
      margin-bottom: 6px;
    }

    /* CTA Button */
    #cta-container {
      display: none;
      padding: 12px 16px;
      background: var(--black);
      border-top: 1px solid var(--border-subtle);
    }
    #cta-button {
      width: 100%;
      padding: 14px;
      background: var(--gold-gradient);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    #cta-button:hover { box-shadow: 0 4px 20px rgba(185, 156, 79, 0.35); }

    /* Input area */
    #chat-input-area {
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      border-top: 1px solid var(--border-gold);
      background: var(--black);
      flex-shrink: 0;
      gap: 8px;
    }
    #chat-input-wrapper { flex: 1; position: relative; }
    #chat-input {
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 11px 18px;
      font-size: 16px;
      outline: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      resize: none;
      max-height: 80px;
      background: var(--surface-raised);
      color: #e0e0e0;
      transition: border-color 0.2s;
    }
    #chat-input::placeholder { color: #555; }
    #chat-input:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(185, 156, 79, 0.1); }

    .action-btn {
      background: transparent;
      color: #555;
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .action-btn:hover { color: var(--gold); border-color: var(--gold); }
    .action-btn.recording {
      color: #fc5454;
      border-color: #fc5454;
      animation: pulse-recording 1.5s infinite;
    }
    @keyframes pulse-recording {
      0%, 100% { box-shadow: 0 0 0 0 rgba(252, 84, 84, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(252, 84, 84, 0); }
    }
    #chat-send {
      background: var(--gold-gradient);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    #chat-send:hover { box-shadow: 0 2px 12px rgba(185, 156, 79, 0.3); }
    #chat-send:disabled { background: #222; cursor: not-allowed; box-shadow: none; }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 8px 12px;
    }
    .typing span {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #listening-indicator {
      display: none;
      background: rgba(252, 84, 84, 0.06);
      border-top: 1px solid rgba(252, 84, 84, 0.3);
      padding: 8px 16px;
      font-size: 13px;
      color: #fc5454;
      text-align: center;
      animation: fade-pulse 1.5s infinite;
    }
    #listening-indicator.active { display: block; }
    @keyframes fade-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading-history {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 13px;
      gap: 12px;
      letter-spacing: 0.3px;
    }
    .loading-history .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- ========== CHAT SCREEN (shown immediately — zero friction) ========== -->
  <div id="chat-container">
    <div id="chat-header">
      <div class="header-top">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="/images/unchained-logo.png" alt="Unchained Leader" style="height:36px;width:auto;">
          <div>
            <h2>Unwanted Desire Root Mapping (UDRM)</h2>
            <span>Powered by Unchained Leader</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="sign-out-btn" title="Sign out">Sign Out</button>
        </div>
      </div>
      <div id="progress-container">
        <div id="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-label">
          <span id="progress-text">Diagnostic in progress</span>
          <span style="display:flex; align-items:center; gap:10px;">
            <button id="btnReset" class="reset-btn" title="Start over">Reset</button>
            <span id="progress-percent">0%</span>
          </span>
        </div>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div id="listening-indicator">Listening... Speak now</div>
    <div id="cta-container">
      <button id="cta-button">Watch the Art of Freedom Documentary</button>
    </div>
    <div id="chat-input-area">
      <button class="action-btn" id="mic-btn" title="Voice input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div id="chat-input-wrapper">
        <textarea id="chat-input" placeholder="Type your response..." rows="1"></textarea>
      </div>
      <button id="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ========== LOGIN OVERLAY (for returning users) ========== -->
  <div id="login-overlay">
    <div id="login-box">
      <!-- Login section -->
      <div id="login-section">
        <h3>Welcome Back</h3>
        <p class="login-subtitle">Sign in with your email and PIN to access your diagnostic results.</p>
        <input type="email" id="login-email" placeholder="Your email address" autocomplete="email" />
        <input type="password" id="login-pin" placeholder="Your 4-digit PIN" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="off" />
        <div id="login-error"></div>
        <button id="login-submit">Sign In</button>
        <div class="login-links">
          <button id="forgot-pin-link">Forgot PIN?</button>
          <button id="close-login">Cancel</button>
        </div>
      </div>
      <!-- Reset PIN section -->
      <div id="reset-section">
        <h3>Reset Your PIN</h3>
        <p class="reset-subtitle" id="reset-subtitle">Enter your email and we'll send you a 6-digit code.</p>
        <input type="email" id="reset-email" placeholder="Your email address" autocomplete="email" />
        <div id="reset-step-code">
          <input type="text" id="reset-code" placeholder="6-digit code from email" maxlength="6" pattern="\d{6}" inputmode="numeric" autocomplete="off" />
          <input type="password" id="reset-new-pin" placeholder="New 4-digit PIN" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="off" style="margin-top:10px" />
        </div>
        <div id="reset-error"></div>
        <div id="reset-success"></div>
        <button id="login-submit" class="reset-submit-btn" style="background: var(--gold-gradient); color: #000; width:100%; padding:13px; border:none; border-radius:8px; font-size:14px; font-weight:600; font-family:'Montserrat',sans-serif; letter-spacing:0.8px; text-transform:uppercase; cursor:pointer; margin-bottom:10px;">Send Reset Code</button>
        <div class="login-links">
          <button id="back-to-login">Back to Sign In</button>
          <button id="close-reset">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = window.UNCHAINED_MKT_API_URL || (window.location.hostname === 'localhost' ? '' : "https://unchainedleader.io");
    const API_URL = BASE_URL + "/api/chat";
    const AUTH_URL = BASE_URL + "/api/auth";
    const HISTORY_URL = BASE_URL + "/api/history";
    const RESET_URL = BASE_URL + "/api/reset-pin";
    const DIAGNOSTIC_URL = BASE_URL + "/api/diagnostic";
    const CTA_URL = ""; // Set later for Art of Freedom documentary
    const WELCOME_MESSAGE = "Welcome, brother.\n\nThis assessment maps your specific behaviors and patterns to their psychological roots. Every selection you make helps decode why your brain does what it does, including the things that confuse you most.\n\nSelect everything that applies. There are no wrong answers. 100% private. 100% confidential.\n\n8 sections. About 5 minutes. All clicks, no typing required.\n\nReady? Click below to start.";
    const SESSION_KEY = "unchained_mkt_session";
    const SAVE_DEBOUNCE_MS = 2000;

    let messages = [];
    let conversationSummary = null;
    let isStreaming = false;
    let recognition = null;
    let isRecording = false;
    let currentUser = null; // null for anonymous, { email, pin, name } for logged-in
    let saveTimeout = null;
    let currentProgress = 0;
    let diagnosticComplete = false;
    let contactCaptureShown = false;

    // Analytics session ID (anonymous until registration)
    const analyticsSessionId = "s_" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
    const ANALYTICS_URL = BASE_URL + "/api/analytics";
    let sectionStartTime = Date.now();
    const sectionTimes = {};

    // Device detection
    const deviceInfo = {
      type: /Mobi|Android/i.test(navigator.userAgent) ? "mobile" : /Tablet|iPad/i.test(navigator.userAgent) ? "tablet" : "desktop",
      browser: /Chrome/i.test(navigator.userAgent) ? "Chrome" : /Safari/i.test(navigator.userAgent) ? "Safari" : /Firefox/i.test(navigator.userAgent) ? "Firefox" : "Other",
      screenWidth: window.screen.width,
      screenHeight: window.screen.height,
    };

    function trackEvent(eventType, eventData, extra) {
      // Track section timing
      if (eventType.startsWith("section_") && eventType.endsWith("_complete")) {
        const elapsed = Math.round((Date.now() - sectionStartTime) / 1000);
        const sectionNum = eventType.match(/section_(\d+)/)?.[1] || "0";
        sectionTimes[sectionNum] = elapsed;
        eventData = { ...eventData, sectionSeconds: elapsed, device: deviceInfo };
        sectionStartTime = Date.now(); // reset for next section
      }
      if (eventType === "quiz_start") {
        sectionStartTime = Date.now();
        eventData = { ...eventData, device: deviceInfo };
      }

      const payload = {
        sessionId: analyticsSessionId,
        product: "udrm",
        eventType,
        eventData: eventData || {},
        ...(extra || {}),
      };
      fetch(ANALYTICS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      }).catch(() => {}); // fire and forget
    }

    // DOM refs
    const chatContainer = document.getElementById("chat-container");
    const messagesEl = document.getElementById("chat-messages");
    const inputEl = document.getElementById("chat-input");
    const sendBtn = document.getElementById("chat-send");
    const micBtn = document.getElementById("mic-btn");
    const listeningIndicator = document.getElementById("listening-indicator");
    const signOutBtn = document.getElementById("sign-out-btn");
    const progressContainer = document.getElementById("progress-container");
    const progressBarFill = document.getElementById("progress-bar-fill");
    const progressPercent = document.getElementById("progress-percent");
    const progressText = document.getElementById("progress-text");
    const ctaContainer = document.getElementById("cta-container");
    const ctaButton = document.getElementById("cta-button");
    const loginOverlay = document.getElementById("login-overlay");
    const btnReset = document.getElementById("btnReset");

    // ========== RESET ==========
    btnReset.addEventListener("click", function() {
      if (!confirm("Start over? All your progress will be cleared.")) return;
      try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
      window.location.reload();
    });

    // ========== PROGRESS BAR ==========
    function updateProgress(percent) {
      if (percent <= currentProgress && percent !== 100) return;
      currentProgress = percent;
      progressContainer.style.display = "block";
      progressBarFill.style.width = percent + "%";
      progressPercent.textContent = percent + "%";

      if (percent >= 100) {
        progressText.textContent = "Diagnostic complete";
        diagnosticComplete = true;
      } else if (percent >= 92) {
        progressText.textContent = "Almost done";
      } else if (percent >= 67) {
        progressText.textContent = "Home stretch";
      } else if (percent >= 50) {
        progressText.textContent = "Halfway there";
      } else {
        progressText.textContent = "Diagnostic in progress";
      }
    }

    function parseProgressFromResponse(text) {
      const match = text.match(/\[PROGRESS:(\d+)\]/);
      if (match) {
        const pct = parseInt(match[1], 10);
        updateProgress(pct);
        if (pct >= 98) trackEvent("reveal_shown", { progress: pct });
      }
      return text.replace(/\[PROGRESS:\d+\]/g, "").trim();
    }

    function cleanDisplayText(text) {
      return text
        .replace(/\[PROGRESS:\d+\]/g, "")
        .replace(/\[CRISIS_DETECTED\]/g, "")
        .replace(/\[CONTACT_CAPTURE\]/g, "")
        .replace(/\[CTA_PLACEHOLDER\]/g, "")
        .replace(/\[BOOKING_CTA\]/g, "")
        .replace(/\[MC_OPTIONS\][\s\S]*?\[\/MC_OPTIONS\]/g, "")
        .replace(/\[MULTI_SELECT\][\s\S]*?\[\/MULTI_SELECT\]/g, "")
        .replace(/\[SINGLE_SELECT\][\s\S]*?\[\/SINGLE_SELECT\]/g, "")
        .replace(/\[TEXT_INPUT\][\s\S]*?\[\/TEXT_INPUT\]/g, "")
        .trim();
    }

    // Get only the intro text before first quiz block (for bubble display when quiz is rendered)
    function getTextBeforeQuizBlocks(text) {
      const firstBlock = text.search(/\[(MULTI_SELECT|SINGLE_SELECT|TEXT_INPUT)\]/);
      if (firstBlock <= 0) return cleanDisplayText(text);
      const before = text.substring(0, firstBlock);
      return cleanDisplayText(before).replace(/^["']+|["']+$/g, "").trim();
    }

    // ========== QUIZ UI RENDERING ==========
    function parseQuizBlocks(text) {
      const blocks = [];
      // Find all MULTI_SELECT, SINGLE_SELECT, and TEXT_INPUT blocks in order
      // Also capture text BETWEEN blocks as labels (needed for Section 8)
      const blockRegex = /\[(MULTI_SELECT|SINGLE_SELECT|TEXT_INPUT)\]([\s\S]*?)\[\/\1\]/g;
      let lastIndex = 0;
      let match;

      // Strip progress/control tags before parsing for labels
      const cleanForLabels = text
        .replace(/\[PROGRESS:\d+\]/g, "")
        .replace(/\[CONTACT_CAPTURE\]/g, "")
        .replace(/\[CRISIS_DETECTED\]/g, "")
        .replace(/\[BOOKING_CTA\]/g, "");

      // Reset regex for clean text
      const regex2 = /\[(MULTI_SELECT|SINGLE_SELECT|TEXT_INPUT)\]([\s\S]*?)\[\/\1\]/g;
      let isFirstBlock = true;
      while ((match = regex2.exec(cleanForLabels)) !== null) {
        // Capture interstitial text as a label (skip text BEFORE first block — that's shown in the bubble)
        const between = cleanForLabels.substring(lastIndex, match.index).trim();
        if (!isFirstBlock && between && between.length > 2) {
          const labelText = between.replace(/^["']+|["']+$/g, "").trim();
          if (labelText) blocks.push({ type: "label", text: labelText });
        }
        isFirstBlock = false;
        lastIndex = match.index + match[0].length;

        const type = match[1];
        const content = match[2].trim();
        if (type === "TEXT_INPUT") {
          blocks.push({ type: "text_input", placeholder: content });
        } else {
          const lines = content.split("\n").filter(l => l.trim());
          const options = lines.map(line => {
            const idx = line.indexOf("|");
            if (idx > 0) {
              return { id: line.substring(0, idx).trim(), text: line.substring(idx + 1).trim() };
            }
            return null;
          }).filter(Boolean);
          blocks.push({ type: type === "MULTI_SELECT" ? "multi" : "single", options });
        }
      }
      return blocks.length > 0 ? blocks : null;
    }

    function renderQuizBlocks(blocks, parentDiv) {
      const wrapper = document.createElement("div");
      wrapper.className = "quiz-wrapper";
      const allSelections = {}; // { blockIndex: Set of selected ids }
      let textInputValue = "";

      blocks.forEach((block, blockIdx) => {
        if (block.type === "label") {
          const label = document.createElement("div");
          label.className = "quiz-label";
          label.textContent = block.text;
          wrapper.appendChild(label);
          return;
        }
        if (block.type === "text_input") {
          const input = document.createElement("textarea");
          input.className = "quiz-text-input";
          input.placeholder = block.placeholder;
          input.rows = 1;
          input.addEventListener("input", () => { textInputValue = input.value; });
          wrapper.appendChild(input);
        } else {
          allSelections[blockIdx] = new Set();
          const container = document.createElement("div");
          container.className = "quiz-block";

          block.options.forEach(opt => {
            const optDiv = document.createElement("div");
            optDiv.className = "quiz-option" + (block.type === "single" ? " radio" : "");
            const checkDiv = document.createElement("div");
            checkDiv.className = "quiz-check";
            const textDiv = document.createElement("div");
            textDiv.className = "quiz-option-text";
            textDiv.textContent = opt.text;
            optDiv.appendChild(checkDiv);
            optDiv.appendChild(textDiv);
            optDiv.addEventListener("click", () => {
              if (block.type === "single") {
                container.querySelectorAll(".quiz-option").forEach(o => o.classList.remove("checked"));
                allSelections[blockIdx] = new Set([opt.id]);
              } else {
                if (optDiv.classList.contains("checked")) {
                  allSelections[blockIdx].delete(opt.id);
                } else {
                  allSelections[blockIdx].add(opt.id);
                }
              }
              optDiv.classList.toggle("checked");
              // Validate: all single-select blocks need a selection, multi-select needs at least one
              let valid = true;
              for (const [idx, sel] of Object.entries(allSelections)) {
                const b = blocks[parseInt(idx)];
                if (!b) continue;
                if (b.type === "single" && sel.size === 0) { valid = false; break; }
              }
              if (valid) {
                const hasMultis = Object.entries(allSelections).some(([idx]) => blocks[parseInt(idx)]?.type === "multi");
                if (hasMultis) {
                  const anyMultiFilled = Object.entries(allSelections).some(([idx, sel]) => blocks[parseInt(idx)]?.type === "multi" && sel.size > 0);
                  if (!anyMultiFilled) valid = false;
                }
              }
              continueBtn.disabled = !valid;
            });
            container.appendChild(optDiv);
          });
          wrapper.appendChild(container);
        }
      });

      // Continue button
      const continueBtn = document.createElement("button");
      continueBtn.className = "quiz-continue-btn";
      continueBtn.textContent = "Continue";
      continueBtn.disabled = true;
      continueBtn.addEventListener("click", () => {
        // Disable all options
        wrapper.querySelectorAll(".quiz-option").forEach(o => {
          if (!o.classList.contains("checked")) o.classList.add("disabled");
          o.style.pointerEvents = "none";
        });
        continueBtn.disabled = true;
        continueBtn.style.display = "none";
        const textInputs = wrapper.querySelectorAll(".quiz-text-input");
        textInputs.forEach(t => { t.disabled = true; });

        // Build the user message from selections
        const selectedIds = [];
        const selectedTexts = [];
        Object.keys(allSelections).forEach(idx => {
          const block = blocks[parseInt(idx)];
          allSelections[idx].forEach(id => {
            selectedIds.push(id);
            const opt = block.options.find(o => o.id === id);
            if (opt) selectedTexts.push(opt.text);
          });
        });

        let userMsg = "Selected: " + selectedIds.join(", ");
        if (textInputValue.trim()) {
          userMsg += "\nAdditional: " + textInputValue.trim();
        }

        // Track section completion with selections
        const sectionMatch = (messages.filter(m => m.role === "assistant").length || 0);
        trackEvent(`section_${sectionMatch}_complete`, { selections: selectedIds, textInput: textInputValue.trim() || null }, {
          selections: selectedIds,
          sectionNum: sectionMatch,
          email: currentUser ? currentUser.email : null,
        });

        addMessage("user", selectedTexts.join(" | ") + (textInputValue.trim() ? " | " + textInputValue.trim() : ""));
        messages.push({ role: "user", content: userMsg });
        sendToAI();
      });
      wrapper.appendChild(continueBtn);
      parentDiv.appendChild(wrapper);
      // Scroll to the top of this section so user sees the header and first options
      setTimeout(() => {
        parentDiv.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    // Legacy MC support
    function parseMCOptions(text) {
      const match = text.match(/\[MC_OPTIONS\]([\s\S]*?)\[\/MC_OPTIONS\]/);
      if (!match) return null;
      const lines = match[1].trim().split("\n").filter(l => l.trim());
      return lines.map(line => {
        const parts = line.split("|");
        if (parts.length >= 2) {
          return { label: parts[0].trim(), text: parts.slice(1).join("|").trim() };
        }
        return null;
      }).filter(Boolean);
    }

    function renderMCButtons(options, parentDiv) {
      const container = document.createElement("div");
      container.className = "mc-options";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "mc-btn";
        btn.innerHTML = `<span class="mc-label">${opt.label}</span>${opt.text}`;
        btn.addEventListener("click", () => {
          container.querySelectorAll(".mc-btn").forEach(b => {
            if (b === btn) b.classList.add("selected");
            else b.classList.add("disabled");
          });
          const userMsg = `${opt.label}) ${opt.text}`;
          addMessage("user", userMsg);
          messages.push({ role: "user", content: userMsg });
          sendToAI();
        });
        container.appendChild(btn);
      });
      parentDiv.appendChild(container);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ========== CTA ==========
    ctaButton.addEventListener("click", () => {
      if (CTA_URL) window.open(CTA_URL, "_blank");
    });

    // ========== CONTACT CAPTURE (inline in chat after teaser) ==========
    function showContactCapture() {
      if (contactCaptureShown) return;
      contactCaptureShown = true;

      // If already logged in, skip the form and auto-generate the report
      if (currentUser) {
        trackEvent("contact_capture_auto", { email: currentUser.email });
        saveDiagnosticData();
        generateAndSendReport();
        const confirmDiv = document.createElement("div");
        confirmDiv.className = "msg assistant";
        confirmDiv.innerHTML = '<div class="msg-bubble">Your report is being generated and will be sent to ' + escapeHtml(currentUser.email) + ' within 5 minutes. Check your inbox.</div>';
        messagesEl.appendChild(confirmDiv);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }
      trackEvent("contact_capture_shown", { timestamp: new Date().toISOString() });

      const captureDiv = document.createElement("div");
      captureDiv.id = "contact-capture";
      captureDiv.style.display = "block";
      captureDiv.innerHTML = `
        <h3>Where should we send your report?</h3>
        <p class="capture-subtitle">Unchained Leader exists because of trust. Your information is 100% confidential. We never share it. Ever.</p>
        <input type="text" id="capture-name" placeholder="Your first name" autocomplete="given-name" />
        <input type="email" id="capture-email" placeholder="Your email address" autocomplete="email" />
        <input type="tel" id="capture-phone" placeholder="Phone number (we'll text you a discreet private link)" autocomplete="tel" />
        <input type="password" id="capture-pin" placeholder="Choose a 4-digit PIN (secures your report)" maxlength="4" pattern="\\d{4}" inputmode="numeric" autocomplete="off" />
        <div id="capture-error"></div>
        <button id="capture-submit">Build My Report</button>
      `;
      messagesEl.appendChild(captureDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      document.getElementById("capture-submit").addEventListener("click", handleContactCapture);
      document.getElementById("capture-pin").addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleContactCapture();
      });
    }

    async function handleContactCapture() {
      const name = document.getElementById("capture-name").value.trim();
      const email = document.getElementById("capture-email").value.trim();
      const phone = document.getElementById("capture-phone").value.trim();
      const pin = document.getElementById("capture-pin").value.trim();
      const errorEl = document.getElementById("capture-error");
      const submitBtn = document.getElementById("capture-submit");
      errorEl.textContent = "";

      if (!name) { errorEl.textContent = "Please enter your first name."; return; }
      if (!email) { errorEl.textContent = "Please enter your email."; return; }
      if (!pin || !/^\d{4}$/.test(pin)) { errorEl.textContent = "PIN must be exactly 4 digits."; return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      try {
        // Register account
        const res = await fetch(AUTH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "register", email, pin, name, phone }),
        });

        const data = await res.json();
        if (!res.ok) {
          // If already registered, try logging in
          if (res.status === 409) {
            const loginRes = await fetch(AUTH_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "login", email, pin }),
            });
            const loginData = await loginRes.json();
            if (!loginRes.ok) {
              errorEl.textContent = loginData.error || "That email is already registered with a different PIN.";
              submitBtn.disabled = false;
              submitBtn.textContent = "Lock It In";
              return;
            }
          } else {
            errorEl.textContent = data.error || "Something went wrong.";
            submitBtn.disabled = false;
            submitBtn.textContent = "Lock It In";
            return;
          }
        }

        // Success — save session
        currentUser = { email: email.toLowerCase(), pin, name };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); } catch(e) {}
        trackEvent("contact_capture_complete", { email: email.toLowerCase(), name });

        // Show sign out button
        signOutBtn.style.display = "block";

        // Save conversation history to server
        saveHistoryToServer();

        // Save diagnostic data first, then generate report
        // Must await diagnostic save so report endpoint can authenticate and find data
        try {
          await saveDiagnosticData();
        } catch(e) {
          console.error("Diagnostic save error (continuing anyway):", e.message);
        }

        // Small delay to ensure Redis write is propagated
        await new Promise(r => setTimeout(r, 1000));

        // Generate and send Report 1 PDF via email (fire and forget — Opus takes 60-90s)
        generateAndSendReport();

        // Hide the capture form and show confirmation
        const captureEl = document.getElementById("contact-capture");
        captureEl.innerHTML = `
          <div style="text-align:center; padding: 8px 0;">
            <div style="color: var(--gold); font-size: 16px; font-weight: 600; margin-bottom: 8px;">Locked in.</div>
            <div style="color: #888; font-size: 13px; line-height: 1.5;">Your 25-page Unwanted Desire Root Map is being generated now and will arrive at ${email} within the next few minutes. A discreet link is being texted to you as well.<br><br>You can log back in anytime using your email and PIN.</div>
          </div>
        `;

        // Show static confirmation — do NOT send to AI
        diagnosticComplete = true;
        setTimeout(() => {
          const confirmMsg = document.createElement("div");
          confirmMsg.className = "msg assistant";
          confirmMsg.innerHTML = '<div class="msg-bubble">Your report is being built right now. It will arrive at ' + escapeHtml(email) + ' within the next few minutes. Check your inbox (and spam folder, just in case).\n\nThis is the most important email you will receive today. Read it carefully. Every page was built from your answers.</div>';
          messagesEl.appendChild(confirmMsg);
          messagesEl.scrollTop = messagesEl.scrollHeight;

          // Disable further chat — redirect any messages to check email
          inputEl.placeholder = "Your report is on the way. Check your email.";

          // Override sendMessage to redirect to email
          const origSend = sendMessage;
          sendMessage = function() {
            const content = inputEl.value.trim();
            if (!content) return;
            inputEl.value = "";
            addMessage("user", content);
            const redirectMsg = document.createElement("div");
            redirectMsg.className = "msg assistant";
            redirectMsg.innerHTML = '<div class="msg-bubble">Your full 25-page report has everything you need. Check your email at ' + escapeHtml(email) + ' for your Unwanted Desire Root Map. That is where the answers are.</div>';
            messagesEl.appendChild(redirectMsg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          };
        }, 1500);

        // End of post-registration flow — no AI call, just confirmation + redirect to email

      } catch(e) {
        errorEl.textContent = "Connection error. Please try again.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Lock It In";
      }
    }

    // ========== LOGIN OVERLAY (returning users) ==========
    function showLoginOverlay() {
      document.getElementById("login-section").style.display = "block";
      document.getElementById("reset-section").style.display = "none";
      document.getElementById("login-error").textContent = "";
      document.getElementById("login-email").value = "";
      document.getElementById("login-pin").value = "";
      loginOverlay.classList.add("active");
    }

    function hideLoginOverlay() {
      loginOverlay.classList.remove("active");
    }

    document.getElementById("close-login").addEventListener("click", hideLoginOverlay);
    document.getElementById("close-reset").addEventListener("click", hideLoginOverlay);

    document.getElementById("login-submit").addEventListener("click", async () => {
      const email = document.getElementById("login-email").value.trim();
      const pin = document.getElementById("login-pin").value.trim();
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";

      if (!email) { errorEl.textContent = "Please enter your email."; return; }
      if (!pin || !/^\d{4}$/.test(pin)) { errorEl.textContent = "Please enter a 4-digit PIN."; return; }

      const btn = document.getElementById("login-submit");
      btn.disabled = true;

      try {
        const res = await fetch(AUTH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", email, pin }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || "Something went wrong.";
          return;
        }

        currentUser = { email: email.toLowerCase(), pin, name: data.name || null };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); } catch(e) {}

        hideLoginOverlay();
        signOutBtn.style.display = "block";
        await loadHistory();
      } catch(e) {
        errorEl.textContent = "Connection error. Please try again.";
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById("login-pin").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-submit").click();
    });

    // ========== FORGOT PIN (inside login overlay) ==========
    let resetStep = "email";

    document.getElementById("forgot-pin-link").addEventListener("click", () => {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("reset-section").style.display = "block";
      resetStep = "email";
      document.getElementById("reset-email").value = "";
      document.getElementById("reset-code") && (document.getElementById("reset-code").value = "");
      document.getElementById("reset-new-pin") && (document.getElementById("reset-new-pin").value = "");
      document.getElementById("reset-error").textContent = "";
      document.getElementById("reset-success").style.display = "none";
      document.getElementById("reset-step-code").style.display = "none";
      document.querySelector(".reset-submit-btn").textContent = "Send Reset Code";
      document.getElementById("reset-subtitle").textContent = "Enter your email and we'll send you a 6-digit code.";
    });

    document.getElementById("back-to-login").addEventListener("click", () => {
      document.getElementById("reset-section").style.display = "none";
      document.getElementById("login-section").style.display = "block";
    });

    document.querySelector(".reset-submit-btn").addEventListener("click", async () => {
      const errorEl = document.getElementById("reset-error");
      const successEl = document.getElementById("reset-success");
      errorEl.textContent = "";
      successEl.style.display = "none";

      const email = document.getElementById("reset-email").value.trim();
      if (!email) { errorEl.textContent = "Please enter your email."; return; }

      const btn = document.querySelector(".reset-submit-btn");
      btn.disabled = true;

      try {
        if (resetStep === "email") {
          const res = await fetch(RESET_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "request", email }),
          });
          if (!res.ok) {
            const data = await res.json();
            errorEl.textContent = data.error || "Something went wrong.";
            return;
          }
          resetStep = "code";
          document.getElementById("reset-step-code").style.display = "block";
          document.getElementById("reset-email").readOnly = true;
          document.getElementById("reset-email").style.opacity = "0.6";
          btn.textContent = "Reset PIN";
          document.getElementById("reset-subtitle").textContent = "Check your email for the 6-digit code.";
        } else {
          const code = document.getElementById("reset-code").value.trim();
          const newPin = document.getElementById("reset-new-pin").value.trim();
          if (!code || !/^\d{6}$/.test(code)) { errorEl.textContent = "Enter the 6-digit code."; return; }
          if (!newPin || !/^\d{4}$/.test(newPin)) { errorEl.textContent = "New PIN must be 4 digits."; return; }

          const res = await fetch(RESET_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "verify", email, code, newPin }),
          });
          const data = await res.json();
          if (!res.ok) { errorEl.textContent = data.error || "Something went wrong."; return; }

          successEl.textContent = "PIN updated! Returning to sign in...";
          successEl.style.display = "block";
          setTimeout(() => {
            document.getElementById("reset-section").style.display = "none";
            document.getElementById("login-section").style.display = "block";
            document.getElementById("reset-email").readOnly = false;
            document.getElementById("reset-email").style.opacity = "1";
            resetStep = "email";
          }, 2000);
        }
      } catch(e) {
        errorEl.textContent = "Connection error. Please try again.";
      } finally {
        btn.disabled = false;
      }
    });

    // ========== SIGN OUT ==========
    function signOut() {
      if (isStreaming) return;
      currentUser = null;
      messages = [];
      conversationSummary = null;
      currentProgress = 0;
      diagnosticComplete = false;
      contactCaptureShown = false;
      try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
      signOutBtn.style.display = "none";
      progressContainer.style.display = "none";
      progressBarFill.style.width = "0%";
      ctaContainer.style.display = "none";
      messagesEl.innerHTML = "";
      addMessage("assistant", WELCOME_MESSAGE);
      messages.push({ role: "assistant", content: WELCOME_MESSAGE });
      addStartButton();
      addWelcomeBackLink();
    }
    signOutBtn.addEventListener("click", signOut);

    // ========== HISTORY ==========
    async function loadHistory() {
      messagesEl.innerHTML = '<div class="loading-history"><div class="spinner"></div>Loading your results...</div>';

      try {
        const res = await fetch(HISTORY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "load", email: currentUser.email, pin: currentUser.pin }),
        });

        if (res.ok) {
          const data = await res.json();
          conversationSummary = data.summary || null;
          if (data.messages && data.messages.length > 0) {
            messages = data.messages;
            messagesEl.innerHTML = "";
            renderSavedMessages(messages);
            restoreProgressFromHistory(messages);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return;
          }
        }
      } catch(e) {
        console.error("Could not load history:", e.message);
      }

      // No history found — show welcome
      messagesEl.innerHTML = "";
      messages = [];
      addMessage("assistant", WELCOME_MESSAGE);
      messages.push({ role: "assistant", content: WELCOME_MESSAGE });
      addStartButton();
    }

    function saveHistoryToServer() {
      if (!currentUser) return;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await fetch(HISTORY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "save", email: currentUser.email, pin: currentUser.pin, messages }),
          });
        } catch(e) { console.error("Could not save history:", e.message); }
      }, SAVE_DEBOUNCE_MS);
    }

    function renderSavedMessages(savedMessages) {
      messagesEl.innerHTML = "";
      savedMessages.forEach(msg => {
        addMessage(msg.role, cleanDisplayText(msg.content), true);
      });
    }

    function restoreProgressFromHistory(savedMessages) {
      let lastProgress = 0;
      for (const msg of savedMessages) {
        if (msg.role === "assistant") {
          const match = msg.content.match(/\[PROGRESS:(\d+)\]/);
          if (match) lastProgress = parseInt(match[1], 10);
        }
      }
      if (lastProgress > 0) updateProgress(lastProgress);
    }

    // ========== WELCOME BACK LINK ==========
    function addWelcomeBackLink() {
      const linkDiv = document.createElement("div");
      linkDiv.id = "welcome-back-link";
      linkDiv.innerHTML = `<button onclick="showLoginOverlay()">Welcome back? Sign in with your email and PIN</button>`;
      messagesEl.appendChild(linkDiv);
    }

    // ========== SPEECH RECOGNITION ==========
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      micBtn.addEventListener("click", () => {
        if (isRecording) stopRecording(); else startRecording();
      });
    } else {
      micBtn.style.display = "none";
    }

    function startRecording() {
      if (isRecording) return;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";
      recognition.maxAlternatives = 1;
      const existingText = inputEl.value;
      let spokenText = "";
      recognition.onresult = (event) => {
        spokenText = "";
        for (let i = 0; i < event.results.length; i++) spokenText += event.results[i][0].transcript;
        inputEl.value = (existingText ? existingText + " " + spokenText : spokenText).trim();
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
      };
      recognition.onend = () => cleanupRecording();
      recognition.onerror = (event) => {
        console.error("Speech error:", event.error);
        cleanupRecording();
        if (event.error === "not-allowed") alert("Microphone access was denied.");
      };
      try {
        recognition.start();
        isRecording = true;
        micBtn.classList.add("recording");
        listeningIndicator.classList.add("active");
      } catch(e) { cleanupRecording(); }
    }

    function stopRecording() {
      if (!recognition) return;
      try { recognition.stop(); } catch(e) {}
    }

    function cleanupRecording() {
      isRecording = false;
      micBtn.classList.remove("recording");
      listeningIndicator.classList.remove("active");
      recognition = null;
    }

    // ========== MESSAGES ==========
    function addMessage(role, content, skipScroll) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      messagesEl.appendChild(div);
      if (!skipScroll) messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addStartButton() {
      const btnDiv = document.createElement("div");
      btnDiv.id = "start-btn-container";
      btnDiv.style.cssText = "display:flex;justify-content:center;padding:12px 0;";
      const btn = document.createElement("button");
      btn.className = "quiz-continue-btn";
      btn.textContent = "Yes, I'm Ready";
      btn.style.cssText = "max-width:300px;";
      btn.addEventListener("click", () => {
        btnDiv.remove();
        trackEvent("quiz_start", { timestamp: new Date().toISOString() });
        addMessage("user", "Yes");
        messages.push({ role: "user", content: "Yes" });
        sendToAI();
      });
      btnDiv.appendChild(btn);
      messagesEl.appendChild(btnDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typing";
      div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    // ========== SEND ==========
    async function sendMessage() {
      let content = inputEl.value.trim();
      if (!content) return;
      if (isStreaming) return;
      if (isRecording) stopRecording();

      // Remove welcome-back link if present
      const wbLink = document.getElementById("welcome-back-link");
      if (wbLink) wbLink.remove();

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      addMessage("user", content);
      messages.push({ role: "user", content });
      if (currentUser) saveHistoryToServer();
      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            userId: currentUser ? currentUser.email : null,
            userName: currentUser ? currentUser.name : null,
            conversationSummary,
          }),
        });

        if (!response.ok) throw new Error("API error");

        removeTyping();

        const assistantDiv = document.createElement("div");
        assistantDiv.className = "msg assistant";
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        assistantDiv.appendChild(bubble);
        messagesEl.appendChild(assistantDiv);

        let fullResponse = "";
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");
          for (const line of lines) {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullResponse += parsed.text;
                  bubble.textContent = cleanDisplayText(fullResponse);
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch(e) {}
            }
          }
        }

        // Parse progress
        parseProgressFromResponse(fullResponse);

        // Store full response with tags for history
        messages.push({ role: "assistant", content: fullResponse.trim() });

        // Render quiz blocks (multi-select, single-select, text inputs)
        const quizBlocks2 = parseQuizBlocks(fullResponse);
        if (quizBlocks2) {
          bubble.textContent = getTextBeforeQuizBlocks(fullResponse);
          renderQuizBlocks(quizBlocks2, assistantDiv);
          // Auto-scroll to top of this section
          assistantDiv.scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
          bubble.textContent = cleanDisplayText(fullResponse);
          const mcOptions = parseMCOptions(fullResponse);
          if (mcOptions) renderMCButtons(mcOptions, assistantDiv);
          // Auto-scroll long messages (reveal) to top
          if (cleanDisplayText(fullResponse).length > 300) {
            setTimeout(() => assistantDiv.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
          }
        }

        if (currentUser) saveHistoryToServer();

        // Check for contact capture trigger
        if (fullResponse.includes("[CONTACT_CAPTURE]") && !currentUser) {
          showContactCapture();
        }

        // Check for booking CTA trigger
        if (fullResponse.includes("[BOOKING_CTA]")) {
          showBookingCTA();
        }

      } catch(error) {
        removeTyping();
        addMessage("assistant", "I'm having trouble connecting right now. Please try again in a moment, or reach out to support@UnchainedLeader.com if you need to talk to someone.");
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ========== SEND TO AI (used by MC buttons) ==========
    function sendToAI() {
      if (isStreaming) return;
      isStreaming = true;
      sendBtn.disabled = true;
      showTyping();

      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages,
          userId: currentUser ? currentUser.email : null,
          userName: currentUser ? currentUser.name : null,
          conversationSummary,
        }),
      }).then(async (response) => {
        if (!response.ok) throw new Error("API error");
        removeTyping();
        const assistantDiv = document.createElement("div");
        assistantDiv.className = "msg assistant";
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        assistantDiv.appendChild(bubble);
        messagesEl.appendChild(assistantDiv);
        let fullResponse = "";
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");
          for (const line of lines) {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullResponse += parsed.text;
                  bubble.textContent = cleanDisplayText(fullResponse);
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch(e) {}
            }
          }
        }
        parseProgressFromResponse(fullResponse);
        messages.push({ role: "assistant", content: fullResponse.trim() });

        // Render quiz blocks (multi-select, single-select, text inputs)
        const quizBlocks = parseQuizBlocks(fullResponse);
        if (quizBlocks) {
          bubble.textContent = getTextBeforeQuizBlocks(fullResponse);
          renderQuizBlocks(quizBlocks, assistantDiv);
          assistantDiv.scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
          // Fallback to old MC buttons if no quiz blocks
          const mcOptions = parseMCOptions(fullResponse);
          if (mcOptions) renderMCButtons(mcOptions, assistantDiv);
          if (cleanDisplayText(fullResponse).length > 300) {
            setTimeout(() => assistantDiv.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
          }
        }

        if (currentUser) saveHistoryToServer();
        if (fullResponse.includes("[CONTACT_CAPTURE]") && !currentUser) showContactCapture();
        if (fullResponse.includes("[BOOKING_CTA]")) showBookingCTA();
        isStreaming = false;
        sendBtn.disabled = false;
      }).catch(() => {
        removeTyping();
        addMessage("assistant", "I'm having trouble connecting. Please try again.");
        isStreaming = false;
        sendBtn.disabled = false;
      });
    }

    // ========== SAVE DIAGNOSTIC DATA ==========
    async function saveDiagnosticData() {
      if (!currentUser) return;
      try {
        await fetch(DIAGNOSTIC_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: currentUser.email,
            pin: currentUser.pin,
            name: currentUser.name,
            messages: messages,
            completedAt: new Date().toISOString(),
          }),
        });
      } catch(e) { console.error("Could not save diagnostic data:", e.message); }
    }

    // ========== GENERATE AND SEND REPORT ==========
    async function generateAndSendReport() {
      if (!currentUser) return;
      try {
        const REPORT_URL = BASE_URL + "/api/report";
        const res = await fetch(REPORT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: currentUser.email,
            pin: currentUser.pin,
            name: currentUser.name,
            diagnosticData: messages,
          }),
        });
        if (!res.ok) {
          console.error("Report generation failed:", await res.text());
        }
      } catch(e) { console.error("Could not generate report:", e.message); }
    }

    // ========== BOOKING CTA ==========
    const BOOKING_URL = ""; // Set to Calendly URL when ready

    function showBookingCTA() {
      const bookingDiv = document.createElement("div");
      bookingDiv.style.cssText = "margin: 14px 0; max-width: 85%;";
      bookingDiv.innerHTML = `
        <a href="${BOOKING_URL || '#'}" target="_blank" rel="noopener"
           style="display:block; width:100%; padding:16px; background:linear-gradient(135deg, #DFC468, #9A7730); color:#000; border:none; border-radius:10px; font-size:15px; font-weight:700; font-family:'Montserrat',sans-serif; letter-spacing:1px; text-transform:uppercase; cursor:pointer; text-decoration:none; text-align:center; transition:all 0.25s;"
           onmouseover="this.style.boxShadow='0 4px 20px rgba(185,156,79,0.4)'"
           onmouseout="this.style.boxShadow='none'"
           id="booking-cta-btn">
          Book Your Clarity Call — $27
        </a>
        <div style="text-align:center; margin-top:8px; color:#555; font-size:11px;">
          30 minutes with an Unchained Leader certified coach
        </div>
      `;
      messagesEl.appendChild(bookingDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (!BOOKING_URL) {
        document.getElementById("booking-cta-btn").addEventListener("click", (e) => {
          e.preventDefault();
          alert("Booking link coming soon. Your diagnostic data is saved.");
        });
      }
    }

    // ========== EVENT LISTENERS ==========
    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
    });

    // ========== INIT ==========
    (async function init() {
      // Check for existing session (returning user)
      try {
        const saved = localStorage.getItem(SESSION_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.email && parsed.pin) {
            currentUser = parsed;
            signOutBtn.style.display = "block";
            await loadHistory();
            return;
          }
        }
      } catch(e) {}

      // No session — anonymous start. Zero friction.
      messagesEl.innerHTML = "";
      addMessage("assistant", WELCOME_MESSAGE);
      messages.push({ role: "assistant", content: WELCOME_MESSAGE });
      addStartButton();
      addWelcomeBackLink();
    })();
  </script>
</body>
</html>
