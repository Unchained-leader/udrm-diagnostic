<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unchained AI Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    /* ========== BRAND VARIABLES ========== */
    :root {
      --gold: #b99c4f;
      --gold-light: #DFC468;
      --gold-dark: #9A7730;
      --gold-gradient: linear-gradient(135deg, #DFC468, #9A7730);
      --gold-gradient-hover: linear-gradient(135deg, #e8d07a, #a88335);
      --black: #000000;
      --white: #ffffff;
      --gray-light: #ececec;
      --gray-dark: #1a1a1a;
      --gray-mid: #888;
      --surface: #0d0d0d;
      --surface-raised: #151515;
      --border-subtle: #222;
      --border-gold: rgba(185, 156, 79, 0.3);
    }

    /* ========== AUTH SCREEN ========== */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      text-align: center;
      background: radial-gradient(ellipse at center bottom, rgba(185, 156, 79, 0.06) 0%, transparent 70%);
    }
    #auth-screen h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #auth-screen .subtitle {
      font-family: 'Montserrat', sans-serif;
      color: #666;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 36px;
    }
    #auth-form {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #auth-form input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--surface-raised);
      color: #e0e0e0;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-form input:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(185, 156, 79, 0.15); }
    #auth-form input::placeholder { color: #555; }
    .auth-btn {
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    #auth-submit {
      background: var(--gold-gradient);
      color: #000;
      border: none;
    }
    #auth-submit:hover { background: var(--gold-gradient-hover); box-shadow: 0 4px 16px rgba(185, 156, 79, 0.25); }
    #auth-submit:disabled { background: #333; cursor: not-allowed; box-shadow: none; }
    #auth-toggle {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--border-subtle);
      font-weight: 400;
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0.3px;
    }
    #auth-toggle:hover { border-color: var(--gold); background: rgba(185, 156, 79, 0.05); }
    #auth-error {
      color: #fc5454;
      font-size: 13px;
      min-height: 20px;
    }
    #auth-loading {
      display: none;
      color: var(--gold);
      font-size: 13px;
    }
    .signed-in-as {
      font-size: 11px;
      color: #555;
      cursor: pointer;
      padding: 2px 8px;
    }
    .signed-in-as:hover { color: var(--gold); }

    /* ========== CHAT CONTAINER ========== */
    #chat-container {
      display: none;
      flex-direction: column;
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: var(--black);
    }
    #chat-header {
      background: var(--black);
      border-bottom: 1px solid var(--border-gold);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #chat-header h2 {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    #chat-header span {
      font-size: 11px;
      color: #555;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #new-chat-btn {
      background: transparent;
      border: 1px solid var(--border-gold);
      color: var(--gold);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    #new-chat-btn:hover { background: rgba(185, 156, 79, 0.1); border-color: var(--gold); }
    #sign-out-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: #555;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #sign-out-btn:hover { border-color: #444; color: #888; }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: var(--surface);
    }
    /* Custom scrollbar */
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    #chat-messages::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    .msg {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-weight: 400;
    }
    .msg.user .msg-bubble {
      background: var(--gold-gradient);
      color: #000;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface-raised);
      color: #ddd;
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }

    /* File attachment bubble */
    .file-attachment {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(185, 156, 79, 0.08);
      border: 1px solid var(--border-gold);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      max-width: 85%;
      font-size: 13px;
      color: var(--gold);
    }
    .file-attachment svg { flex-shrink: 0; }
    .file-attachment .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-attachment .file-size {
      color: var(--gold-dark);
      font-size: 11px;
      flex-shrink: 0;
    }

    /* Input area */
    #chat-input-area {
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      border-top: 1px solid var(--border-gold);
      background: var(--black);
      flex-shrink: 0;
      gap: 8px;
    }
    #chat-input-wrapper {
      flex: 1;
      position: relative;
    }
    #file-preview {
      display: none;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--gold);
      align-items: center;
      gap: 8px;
    }
    #file-preview.active { display: flex; }
    #file-preview .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #file-preview .remove-file {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    #file-preview .remove-file:hover { color: #e0e0e0; }
    #chat-input {
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 11px 18px;
      font-size: 14px;
      outline: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      resize: none;
      max-height: 80px;
      background: var(--surface-raised);
      color: #e0e0e0;
      transition: border-color 0.2s;
    }
    #chat-input.has-file {
      border-radius: 0 0 12px 12px;
      border-top-color: var(--border-subtle);
    }
    #chat-input::placeholder { color: #555; }
    #chat-input:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(185, 156, 79, 0.1); }
    #chat-input.has-file:focus { border-color: var(--gold); }

    /* Action buttons */
    .action-btn {
      background: transparent;
      color: #555;
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .action-btn:hover { color: var(--gold); border-color: var(--gold); }
    .action-btn.recording {
      color: #fc5454;
      border-color: #fc5454;
      animation: pulse-recording 1.5s infinite;
    }
    @keyframes pulse-recording {
      0%, 100% { box-shadow: 0 0 0 0 rgba(252, 84, 84, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(252, 84, 84, 0); }
    }
    #chat-send {
      background: var(--gold-gradient);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    #chat-send:hover { box-shadow: 0 2px 12px rgba(185, 156, 79, 0.3); }
    #chat-send:disabled { background: #222; cursor: not-allowed; box-shadow: none; }

    /* Mic not supported banner */
    #mic-unsupported {
      display: none;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      color: #555;
      font-size: 12px;
      padding: 8px 16px;
      text-align: center;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 8px 12px;
    }
    .typing span {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Listening indicator */
    #listening-indicator {
      display: none;
      background: rgba(252, 84, 84, 0.06);
      border-top: 1px solid rgba(252, 84, 84, 0.3);
      padding: 8px 16px;
      font-size: 13px;
      color: #fc5454;
      text-align: center;
      animation: fade-pulse 1.5s infinite;
    }
    #listening-indicator.active { display: block; }
    @keyframes fade-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Loading spinner for history load */
    .loading-history {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 13px;
      gap: 12px;
      letter-spacing: 0.3px;
    }
    .loading-history .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- ========== AUTH SCREEN ========== -->
  <div id="auth-screen">
    <h2>Unchained AI Coach</h2>
    <p class="subtitle">Sign in to access your coaching conversations</p>
    <div id="auth-form">
      <input type="email" id="auth-email" placeholder="Your email address" autocomplete="email" />
      <input type="password" id="auth-pin" placeholder="4-digit PIN" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="off" />
      <div id="auth-error"></div>
      <div id="auth-loading">Signing in...</div>
      <button class="auth-btn" id="auth-submit">Sign In</button>
      <button class="auth-btn" id="auth-toggle">First time? Create an account</button>
    </div>
  </div>

  <!-- ========== CHAT SCREEN ========== -->
  <div id="chat-container">
    <div id="chat-header">
      <div>
        <h2>Unchained AI Coach</h2>
        <span>Powered by Unchained Leader RNR Methodology</span>
      </div>
      <div class="header-actions">
        <button id="new-chat-btn" title="Start a new conversation">New Chat</button>
        <button id="sign-out-btn" title="Sign out">Sign Out</button>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div id="listening-indicator">Listening... Speak now</div>
    <div id="chat-input-area">
      <!-- File upload (hidden input) -->
      <input type="file" id="file-input" style="display:none" accept=".txt,.pdf,.doc,.docx,.jpg,.jpeg,.png,.csv,.xlsx" />

      <!-- Upload button -->
      <button class="action-btn" id="upload-btn" title="Upload homework file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <!-- Mic button -->
      <button class="action-btn" id="mic-btn" title="Voice input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <!-- Text input with file preview -->
      <div id="chat-input-wrapper">
        <div id="file-preview">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b99c4f" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="file-name" id="file-preview-name"></span>
          <button class="remove-file" id="remove-file-btn">&times;</button>
        </div>
        <textarea id="chat-input" placeholder="What's going on?" rows="1"></textarea>
      </div>

      <!-- Send button -->
      <button id="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const BASE_URL = "https://unchained-ai-coach.vercel.app/api";
    const API_URL = BASE_URL + "/chat";
    const AUTH_URL = BASE_URL + "/auth";
    const HISTORY_URL = BASE_URL + "/history";
    const WELCOME_MESSAGE = "Hey brother. I'm your Unchained AI Coach \u2014 I know every module, every framework, and every exercise in the program. Whether you need help understanding a concept, walking through an exercise, or processing a trigger right now, I'm here. What's going on?";
    const SESSION_KEY = "unchained_session";
    const SAVE_DEBOUNCE_MS = 2000;

    let messages = [];
    let conversationSummary = null;
    let isStreaming = false;
    let pendingFile = null;
    let recognition = null;
    let isRecording = false;
    let currentUser = null; // { email, pin }
    let saveTimeout = null;

    // DOM refs
    const authScreen = document.getElementById("auth-screen");
    const chatContainer = document.getElementById("chat-container");
    const authEmail = document.getElementById("auth-email");
    const authPin = document.getElementById("auth-pin");
    const authSubmit = document.getElementById("auth-submit");
    const authToggle = document.getElementById("auth-toggle");
    const authError = document.getElementById("auth-error");
    const authLoading = document.getElementById("auth-loading");
    const messagesEl = document.getElementById("chat-messages");
    const inputEl = document.getElementById("chat-input");
    const sendBtn = document.getElementById("chat-send");
    const micBtn = document.getElementById("mic-btn");
    const uploadBtn = document.getElementById("upload-btn");
    const fileInput = document.getElementById("file-input");
    const filePreview = document.getElementById("file-preview");
    const filePreviewName = document.getElementById("file-preview-name");
    const removeFileBtn = document.getElementById("remove-file-btn");
    const listeningIndicator = document.getElementById("listening-indicator");
    const newChatBtn = document.getElementById("new-chat-btn");
    const signOutBtn = document.getElementById("sign-out-btn");

    // ========== AUTH ==========
    let isRegisterMode = false;

    authToggle.addEventListener("click", () => {
      isRegisterMode = !isRegisterMode;
      authSubmit.textContent = isRegisterMode ? "Create Account" : "Sign In";
      authToggle.textContent = isRegisterMode
        ? "Already have an account? Sign In"
        : "First time? Create an account";
      authError.textContent = "";
    });

    authSubmit.addEventListener("click", handleAuth);
    authPin.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleAuth();
    });
    authEmail.addEventListener("keydown", (e) => {
      if (e.key === "Enter") authPin.focus();
    });

    async function handleAuth() {
      const email = authEmail.value.trim();
      const pin = authPin.value.trim();
      authError.textContent = "";

      if (!email) { authError.textContent = "Please enter your email."; return; }
      if (!pin || !/^\d{4}$/.test(pin)) { authError.textContent = "Please enter a 4-digit PIN."; return; }

      authSubmit.disabled = true;
      authLoading.style.display = "block";

      try {
        const res = await fetch(AUTH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: isRegisterMode ? "register" : "login",
            email,
            pin,
          }),
        });

        const data = await res.json();
        if (!res.ok) {
          authError.textContent = data.error || "Something went wrong.";
          return;
        }

        // Success — save session and enter chat
        currentUser = { email: email.toLowerCase(), pin };
        try {
          localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
        } catch (e) {}

        await enterChat();
      } catch (e) {
        authError.textContent = "Connection error. Please try again.";
      } finally {
        authSubmit.disabled = false;
        authLoading.style.display = "none";
      }
    }

    async function enterChat() {
      authScreen.style.display = "none";
      chatContainer.style.display = "flex";

      // Show loading state
      messagesEl.innerHTML = '<div class="loading-history"><div class="spinner"></div>Loading your conversations...</div>';

      // Load history from server
      try {
        const res = await fetch(HISTORY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "load",
            email: currentUser.email,
            pin: currentUser.pin,
          }),
        });

        if (res.ok) {
          const data = await res.json();
          conversationSummary = data.summary || null;

          if (data.messages && data.messages.length > 0) {
            messages = data.messages;
            messagesEl.innerHTML = "";
            renderSavedMessages(messages);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return;
          }
        }
      } catch (e) {
        console.log("Could not load server history:", e.message);
      }

      // No history — show welcome
      messagesEl.innerHTML = "";
      messages = [];
      addMessage("assistant", WELCOME_MESSAGE);
    }

    function signOut() {
      if (isStreaming) return;
      currentUser = null;
      messages = [];
      conversationSummary = null;
      try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
      chatContainer.style.display = "none";
      authScreen.style.display = "flex";
      authEmail.value = "";
      authPin.value = "";
      authError.textContent = "";
      messagesEl.innerHTML = "";
    }

    signOutBtn.addEventListener("click", signOut);

    // ========== SERVER HISTORY ==========
    function saveHistoryToServer() {
      if (!currentUser) return;
      // Debounce saves to avoid hammering the server
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await fetch(HISTORY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "save",
              email: currentUser.email,
              pin: currentUser.pin,
              messages,
            }),
          });
        } catch (e) {
          console.log("Could not save history:", e.message);
        }
      }, SAVE_DEBOUNCE_MS);
    }

    function renderSavedMessages(savedMessages) {
      messagesEl.innerHTML = "";
      savedMessages.forEach(msg => {
        addMessage(msg.role, msg.content, true);
      });
    }

    // ========== SPEECH RECOGNITION ==========
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      micBtn.addEventListener("click", () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });
    } else {
      micBtn.style.display = "none";
    }

    function startRecording() {
      if (isRecording) return;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";
      recognition.maxAlternatives = 1;

      const existingText = inputEl.value;
      let spokenText = "";

      recognition.onresult = (event) => {
        spokenText = "";
        for (let i = 0; i < event.results.length; i++) {
          spokenText += event.results[i][0].transcript;
        }
        const combined = existingText ? existingText + " " + spokenText : spokenText;
        inputEl.value = combined.trim();
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
      };

      recognition.onend = () => { cleanupRecording(); };
      recognition.onerror = (event) => {
        console.log("Speech error:", event.error);
        cleanupRecording();
        if (event.error === "not-allowed") {
          alert("Microphone access was denied. Please allow microphone access in your browser settings.");
        } else if (event.error === "network") {
          alert("Speech recognition requires an internet connection.");
        }
      };

      try {
        recognition.start();
        isRecording = true;
        micBtn.classList.add("recording");
        listeningIndicator.classList.add("active");
      } catch (e) {
        console.error("Failed to start speech recognition:", e);
        cleanupRecording();
      }
    }

    function stopRecording() {
      if (!recognition) return;
      try { recognition.stop(); } catch(e) {}
    }

    function cleanupRecording() {
      isRecording = false;
      micBtn.classList.remove("recording");
      listeningIndicator.classList.remove("active");
      recognition = null;
    }

    // ========== FILE UPLOAD ==========
    uploadBtn.addEventListener("click", () => { fileInput.click(); });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const maxSize = 5 * 1024 * 1024;
      if (file.size > maxSize) {
        alert("File is too large. Maximum size is 5MB.");
        fileInput.value = "";
        return;
      }
      pendingFile = file;
      filePreviewName.textContent = file.name + " (" + formatFileSize(file.size) + ")";
      filePreview.classList.add("active");
      inputEl.classList.add("has-file");
      inputEl.focus();
    });

    removeFileBtn.addEventListener("click", () => { clearPendingFile(); });

    function clearPendingFile() {
      pendingFile = null;
      fileInput.value = "";
      filePreview.classList.remove("active");
      inputEl.classList.remove("has-file");
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    async function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        if (file.type.startsWith("image/")) {
          resolve("[Uploaded image: " + file.name + " (" + formatFileSize(file.size) + "). Note: I can see that you've uploaded an image, but I can't view images directly. Please describe what's in the image or paste any text from it.]");
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          if (text && text.trim().length > 0) {
            const truncated = text.length > 10000 ? text.substring(0, 10000) + "\n\n[...file truncated, showing first 10,000 characters]" : text;
            resolve(truncated);
          } else {
            resolve("[Uploaded file: " + file.name + " — could not extract text content.]");
          }
        };
        reader.onerror = () => {
          resolve("[Uploaded file: " + file.name + " — could not read file content.]");
        };
        reader.readAsText(file);
      });
    }

    // ========== MESSAGES ==========
    function addMessage(role, content, skipScroll) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      messagesEl.appendChild(div);
      if (!skipScroll) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      return div;
    }

    function addFileMessage(fileName, fileSize) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.innerHTML = `
        <div class="file-attachment">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b99c4f" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="file-name">${escapeHtml(fileName)}</span>
          <span class="file-size">${fileSize}</span>
        </div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typing";
      div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    // ========== SEND ==========
    async function sendMessage() {
      let content = inputEl.value.trim();
      let fileContent = null;
      let fileName = null;
      let fileSize = null;

      if (pendingFile) {
        fileName = pendingFile.name;
        fileSize = formatFileSize(pendingFile.size);
        fileContent = await readFileAsText(pendingFile);
        clearPendingFile();
      }

      if (!content && !fileContent) return;
      if (isStreaming) return;
      if (isRecording) stopRecording();

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      let userMessage = "";
      if (fileContent && content) {
        userMessage = content + "\n\n--- Attached File: " + fileName + " ---\n" + fileContent;
      } else if (fileContent) {
        userMessage = "Here's my homework file (" + fileName + "):\n\n" + fileContent;
      } else {
        userMessage = content;
      }

      if (fileName) { addFileMessage(fileName, fileSize); }
      if (content) {
        addMessage("user", content);
      } else if (fileName && !content) {
        addMessage("user", "Here's my homework file.");
      }

      messages.push({ role: "user", content: userMessage });
      saveHistoryToServer();
      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            userId: currentUser ? currentUser.email : null,
            userName: null,
            currentWeek: null,
            conversationSummary,
          }),
        });

        if (!response.ok) throw new Error("API error");

        removeTyping();

        const assistantDiv = document.createElement("div");
        assistantDiv.className = "msg assistant";
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        assistantDiv.appendChild(bubble);
        messagesEl.appendChild(assistantDiv);

        let fullResponse = "";
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullResponse += parsed.text;
                  bubble.textContent = fullResponse.replace("[CRISIS_DETECTED]", "").trim();
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch (e) {}
            }
          }
        }

        messages.push({ role: "assistant", content: fullResponse.replace("[CRISIS_DETECTED]", "").trim() });
        saveHistoryToServer();
      } catch (error) {
        removeTyping();
        addMessage("assistant", "I'm having trouble connecting right now. Please try again in a moment, or reach out to your coach directly if you need immediate support.");
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ========== NEW CHAT ==========
    newChatBtn.addEventListener("click", async () => {
      if (isStreaming) return;

      // Save current conversation as summary on server before clearing
      if (currentUser && messages.length > 0) {
        try {
          await fetch(HISTORY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "clear",
              email: currentUser.email,
              pin: currentUser.pin,
            }),
          });
        } catch (e) {}
      }

      messages = [];
      messagesEl.innerHTML = "";
      addMessage("assistant", WELCOME_MESSAGE);
      inputEl.focus();
    });

    // ========== EVENT LISTENERS ==========
    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
    });

    // ========== INIT ==========
    // Check for saved session
    try {
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.email && parsed.pin) {
          currentUser = parsed;
          enterChat();
        }
      }
    } catch (e) {}
  </script>
</body>
</html>
